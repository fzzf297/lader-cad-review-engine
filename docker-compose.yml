# DWG Review System - Docker Compose Configuration
# Development and Production deployment

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: dwg-review-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dwg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dwg_password}
      POSTGRES_DB: ${POSTGRES_DB:-dwg_review}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dwg_user} -d ${POSTGRES_DB:-dwg_review}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dwg-network

  # Redis Cache and Task Queue
  redis:
    image: redis:7-alpine
    container_name: dwg-review-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dwg-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dwg-review-backend
    restart: unless-stopped
    environment:
      - DEBUG=${DEBUG:-false}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-dwg_user}:${POSTGRES_PASSWORD:-dwg_password}@postgres:5432/${POSTGRES_DB:-dwg_review}
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-104857600}
      - ODA_CONVERTER_PATH=${ODA_CONVERTER_PATH:-/usr/bin/ODAFileConverter}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - QWEN_MODEL=${QWEN_MODEL:-qwen-plus}
      - LLM_ENABLED=${LLM_ENABLED:-false}
      - DWG_CONVERTER_MODE=${DWG_CONVERTER_MODE:-local}
    volumes:
      - uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dwg-network

  # Vue Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dwg-review-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - dwg-network

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local

# Custom network for service communication
networks:
  dwg-network:
    driver: bridge